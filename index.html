<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f5b" />
    <meta
      name="description"
      content="想定売値から上限仕入れ額を計算し、そのまま電卓操作できる軽量アプリ"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <title>上限仕入れ額計算機</title>
  </head>
  <body>
    <div id="app">読み込み中...</div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.setTimeout(function () {
        var app = document.getElementById("app");
        if (!app || app.dataset.ready === "true") {
          return;
        }
        app.innerHTML =
          '<div style="max-width:720px;margin:40px auto;padding:20px;font-family:sans-serif;color:#17231f">' +
          '<h1 style="font-size:20px">アプリを起動できませんでした</h1>' +
          '<p>ページを再読み込みしてください。改善しない場合は、通信状態を確認してください。</p>' +
          "</div>";
      }, 2500);
    </script>
  </body>
</html>
